<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Two favicon variants, matched to browser chrome (not the in-app
         theme toggle): a dark OS/browser theme puts the tab bar on a dark
         background, so the light/white-badge mark shows up best there —
         and vice versa for a light OS theme. -->
    <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" href="/favicon-dark.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vistrow Voice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
